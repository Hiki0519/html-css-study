<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两周复习24</title>
</head>
<body>
    <h1>form 小综合</h1>

    <form>
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名">
        <br>
        <label for="email">邮箱</label>
        <input type="email" id="email" name="email" value="test@qq.com">
        <br>
        <input type="radio" id="male" name="gender">
        <label for="male">男</label>
        <input type="radio" id="female" name="gender" checked> 
        <label for="female">女</label>        
        <br>
        爱好：
        <input type="checkbox" id="basketball" name="hobby">
        <label for="basketball">篮球</label>
        <input type="checkbox" id="music" name="hobby">
        <label for="music">音乐</label>
        <input type="checkbox" id="read" name="hobby" checked>
        <label for="read">阅读</label>
        <br>
        <label for="city">城市</label>
        <select id="city" name="city">
            <option>北京</option>
            <option>上海</option>
            <option selected="selected">广州</option>
            <option>深圳</option>
        </select>
        <br>
        <label for="message">留言</label>
        <br>
        <textarea name="message" id="message" placeholder="请输入留言内容"></textarea>
        <br>
        <input type="submit">
        <input type="reset">
    </form>
</body>
</html>
