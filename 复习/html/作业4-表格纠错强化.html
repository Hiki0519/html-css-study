<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格纠错强化</title>

</head>

<body>
    <table width="400" border="1" cellspacing="0">
        <caption>学生信息表</caption>
        <thead>
            <tr>
                <th>姓名</th>
                <th>年龄</th>
                <th>城市</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>张三</td>
                <td>18</td>
                <td>北京</td>
            </tr>
        </tbody>

        <tbody>
            <tr>
                <td>李四</td>
                <td>19</td>
                <td>上海</td>
            </tr>
        </tbody>

        <tbody>
            <tr>
                <td>王五</td>
                <td>20</td>
                <td>广州</td>
            </tr>
        </tbody>

        <tbody>
            <tr>
                <td>赵六</td>
                <td>21</td>
                <td>深圳</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">以上是学生基本信息</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
