<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 18 Exercise 5</title>
    <style>
        div {
            width: 340px;
            border-radius: 20px;
            box-shadow: 6px 6px 12px lightgray;
            padding-top: 20px;
            padding-left: 20px;
            margin-top: 20px;
        }

        .first {
            background-color: lightyellow;
            border: 2px solid orange;
        }

        .darkorange {
            color: darkorange;
            font-size: 22px;
        }

        p {
            color: gray;
            font-size: 16px;
            line-height: 28px;
        }

        a {
            color: orange;
            text-decoration: none;
            background-color: moccasin;
            border: 2px solid orange;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 18px;
            padding-right: 18px;
            border-radius: 12px;
        }

        .second {
            background-color: lightblue;
            border: 2px solid blue;
        }

        .blue {
            color: blue;
            font-size: 22px;
        }

        img {
            display: block;
            width: 220px;
            height: 160px;
            border: 2px solid blue;
            border-radius: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>CSS Day 18</h1>
    <br>
    <div class="first">
        <h2 class="darkorange">Info Module</h2>
        <p>This is a simple info card.</p>
        <a href="https://example.com">Read More</a>
    </div>
    <br>
    <div class="second">
        <h2 class="blue">Image Module</h2>
        <img src="../../Model.png" alt="Model image">
    </div>
</body>
</html>
