<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div span 文本标签综合练习</title>
</head>
<body>
    <h1>学习内容展示卡片</h1>
    <div>
        <p>普通文字</p>
        <br>
        <strong>重要<span>提醒</span></strong>
        <br>
        <b><span>加粗</span>文字</b>
        <br>
        <em><span>强调</span>语气的文字</em>
        <br>
        <i>斜体文字</i>
        <br>
        <u>下划线文字</u>
        <br>
        <small>小号说明文字</small>
        <br>
        <mark>高亮标记文字</mark>
        <hr>
        <p>今天的总结是：<span>我已经开始掌握常见文本标签。</span></p>
    </div>
</body>
</html>
