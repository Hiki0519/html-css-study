<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置单个项目在交叉轴上的对齐方式</title>
</head>

<style>
    .container {
        width: 300px;
        height: 200px;

        display: flex;

        /* flex-flow: row wrap; */
    }

     .item {
        width: 100px;
        /* height: 50px; */
        font-size: 1.5rem;
        background-color: lightcyan;
    }

    /* 第一个与交叉轴的起始线对齐 */
    .item:first-of-type{
        align-self: flex-start;
        /* auto是默认值，继承的是容器中的align-items */
        align-self: auto;
    }

    /* 第二个项目和中间线对齐 */
    .item:nth-of-type(2){
        align-self: center;
    }

    /* 第三个项目:拉伸 */
    .item:nth-of-type(3){
        align-self: stretch;
    }

    /* 和基线对齐 */
    .item:last-of-type{
        align-self: baseline;
    }

</style>
<body>
    
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>
</body>
</html>
