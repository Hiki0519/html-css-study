<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            margin: 30px;
            width: 100px;
            height: 100px;
            background-color: black;
            transform: rotate(0.1turn);
        }
    </style>
</head>

<body>
    <div class="box"></div>
</body>
</html>

<!-- deg（角度）：rotate(90deg)

turn（圈数）：rotate(0.25turn)（= 1/4 圈）

rad（弧度）：rotate(1.5708rad)（约等于 90°） -->
