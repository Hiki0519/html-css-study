<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 12 Exercise 3</title>
    <style>
        .Blue {
            color: blue;
            background-color: lightblue;
            text-decoration: none;
            border: 2px solid blue;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 18px;
            padding-right: 18px;
            border-radius: 12px;
        }

        .Green {
            color: green;
            background-color: lightgreen;
            text-decoration: none;
            border: 2px solid green;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 18px;
            padding-right: 18px;
            border-radius: 12px;            
        }

        .Orange {
            color: darkorange;
            background-color: moccasin;
            text-decoration: none;
            border: 2px solid orange;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 18px;
            padding-right: 18px;
            border-radius: 12px;             
        }
    </style>
</head>
<body>
    <h1>CSS Day 12</h1>
    <a href="https://example.com" class="Blue">Blue Link Button</a>
    <a href="https://example.com" class="Green">Green Link Button</a>
    <a href="https://example.com" class="Orange">Orange Link Button</a>
</body>
</html>
