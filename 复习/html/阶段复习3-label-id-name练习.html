<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阶段复习3</title>
</head>
<body>
    <h1>label id name 练习</h1>
    <form>
        <label for="username">用户名:</label>
        <input type="text" id="username" name="username" placeholder="用户名输入框">

        <label for="email">邮箱:</label>
        <input type="email" id="email" name="email" value="dada@qq.com">

        <label for="city">城市:</label>
        <input type="text" id="city" name="city" placeholder="城市输入框">

        <label for="gender">性别:</label>
        男<input type="radio" id="男" name="gender" checked>
        女<input type="radio" id="女" name="gender">

        <label for="hobby">爱好:</label>
        <input type="checkbox" id="篮球" name="hobby" checked>篮球
        <input type="checkbox" id="排球" name="hobby" checked>排球
        <input type="checkbox" id="足球" name="hobby" checked>足球
    </form>
</body>
</html>
