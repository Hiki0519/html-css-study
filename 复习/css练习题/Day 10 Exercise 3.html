<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 10 Exercise 3</title>
    <style>
        div {
            width: 320px;
            height: 220px;
            border-radius: 20px;
            box-shadow: 6px 6px 12px lightgray;
            padding-top: 20px;
            padding-left: 20px;
            margin-top: 20px;
        }

        .Orange {
            background-color: moccasin;
            border: 2px solid orange;
        }

        .Purple {
            background-color: lavender;
            border: 2px solid purple;
        }

        h2 {
            font-size: 24px;
        }

        p {
            font-size: 16px;
            line-height: 28px;
        }

        .first {
            color: darkorange;
        }

        .second {
            color: purple;
        }
    </style>
</head>
<body>
    <h1>CSS Day 10</h1>

    <div class="Orange">
        <h2 class="first">Orange Card</h2>
        <p>This is the orange card paragraph.</p>
    </div>

    <div class="Purple">
        <h2 class="second">Purple Card</h2>
        <p>This is the purple card paragraph.</p>
    </div>
</body>
</html>
