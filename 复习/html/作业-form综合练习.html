<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form综合练习</title>
</head>
<body>
    <h1>用户意见反馈表</h1>
    <br>
    <form>
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username" placeholder="用户名输入框">
        <br>
        <label for="password">密码：</label>
        <input type="password" id="password" name="password" placeholder="密码输入框">
        <br>
        <label for="email">邮箱：</label>
        <input type="email" value="adsa@qq.com" id="email" name="email">
        <br>
        <label for="tel">电话：</label>
        <input type="tel" id="tel" name="tel" placeholder="电话输入框">
        <br>
        <label for="age">年龄：</label>
        <input type="number" id="age" name="age" placeholder="年龄输入框">
        <br>
        <label for="gender">性别：</label>
        <input type="radio" id="男" name="gender" checked>男
        <input type="radio" id="女" name="gender">女
        <br>
        <label for="hobby">爱好：</label>
        <input type="checkbox" id="篮球" name="hobby" checked>篮球
        <input type="checkbox" id="排球" name="hobby">排球
        <input type="checkbox" id="足球" name="hobby">足球
        <br>
        <label for="birthday">出生日期：</label>
        <input type="date" id="birthday" name="birthday">
        <br>
        <label for="color">颜色：</label>
        <br>
        <input type="color" id="color" name="color">
        <br>
        <label for="message">留言内容：</label>
        <br>
        <textarea name="message" id="message" rows="5" cols="30" placeholder="留言内容"></textarea>
        <br>
        <label for="remark">备注：</label>
        <br>
        <textarea name="remark" id="remark">备注</textarea>
        <br>
        <input type="submit">
        <input type="reset">
    </form>
</body>
</html>
