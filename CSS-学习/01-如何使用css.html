<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    p{
    color: chocolate;
    font-size:  1em;
    }

    div{
        color: aqua;
        font-size: 16px;
        border: none;
        border-top: 1px solid #000;
        border-left: 1px solid #000;
        border-right: 1px solid #000;
    
        padding: 8px;
        /* padding 内容到边框的距离 */
        text-align: center;
    }

    div:last-of-type{
        border-bottom: 1px solid #000;
    }

    span{
        border: 1px solid #000;
        color: blueviolet;
        font-size: 1em;
    }
</style>

<body>
   <p>这是P标签</p> 
   <div>这是div标签</div>
   <div>换行</div>
   <span>这是span标签</span>
   <span>span不能换行</span>
</body>
</html>
