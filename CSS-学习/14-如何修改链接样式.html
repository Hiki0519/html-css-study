<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    a:link{
        color: #265301;
        /* 链接的颜色 */
    }

    a:visited{
        color: black;
        /* 点击过的链接会变成黑色 */
    }

    a:focus{
        border: 2px solid red;
        /* 尝试点击的瞬间出现边框 也可以是border-bottom(下面出现边框) */
    }

    a:hover{
        color: brown;
        /* 鼠标经过超链接的时候会出现 brown这个颜色 */
    }

    a:active{
        background: #265301;
        color: #CDFEAA;
        /* blackground是背景变成#265301这个颜色，字体变成#CDFEAA这个颜色 */
    }
</style>
<body>
    
    <p>There are several browsers available, such as 
  <a href="https://www.mozilla.org/zh-CN/firefox/">Mozilla Firefox</a>, 
  <a href="https://www.google.com/chrome/index.html">Google Chrome</a>, and 
  <a href="https://www.microsoft.com/zh-CN/windows/microsoft-edge">Microsoft Edge</a>.
  <a href="https://www.baidu.com">baidu</a>
</p>

</body>
</html>
