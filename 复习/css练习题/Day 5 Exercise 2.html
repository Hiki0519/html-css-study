<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 5 Exercise 2</title>
    <style>
        h1 {
            color: purple;
            font-size: 34px;
            text-align: center;
        }

        p {
            color: gray;
            font-size: 18px;
            line-height: 28px;
        }

        .second {
            font-weight: bold;
        }

        .third {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>CSS Day 5</h1>
    <p>This is a normal paragraph.</p>
    <p class="second">This paragraph is bold.</p>
    <p class="third">This paragraph is underlined.</p>
</body>
</html>
