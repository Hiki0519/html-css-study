<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表练习</title>

    <style>
        table {
            border-collapse: collapse;
            width: 500px;
        }

        th,td {
            border: 1px solid black;
            text-align: center;
            padding: 8px;
        }

        th {
            background-color: antiquewhite;
        }
    </style>
</head>

<body>
    <table>
        <caption>课程安排</caption>

        <thead>
            <tr>
                <th>时间</th>
                <th>星期一</th>
                <th>星期二</th>
                <th>星期三</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>上午</td>
                <td>HTML</td>
                <td>CSS</td>
                <td>JavaScript</td>
            </tr>
        </tbody>

        <tbody>
            <tr>
                <td>下午</td>
                <td>表格</td>
                <td>图片</td>
                <td>链接</td>
            </tr>
        </tbody>

        <tbody>
            <tr>
                <td>晚上</td>
                <td>复习</td>
                <td>作业</td>
                <td>总结</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
