<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员信息填写页</title>
</head>
<body>
    <h1>会员信息填写</h1>
    <br>
    用户名:
    <input type="text" id="username" name="username" placeholder="用户名">
    <br>
    密码:
    <input type="password" id="password" name="password" placeholder="密码">
    <br>
    邮箱:
    <input type="email" id="email" name="email" placeholder="邮箱">
    <br>
    电话:
    <input type="tel" id="tel" name="tel" placeholder="电话">
    <br>
    年龄:
    <input type="number" id="age" name="age" placeholder="年龄">
    <br>
    出生日期:
    <input type="date" id="date of birth" name="date of birth">
    <br>
    喜欢的颜色:
    <input type="color" id="color" name="color">
    性别:
    <input type="radio" id="男" name="gender" checked>男
    <input type="radio" id="女" name="gender">女
    <br>
    爱好:
    <input type="checkbox" id="排球" name="hobby" checked>排球
    <input type="checkbox" id="篮球" name="hobby">篮球
    <input type="checkbox" id="足球" name="hobby">足球
</body>
</html>
