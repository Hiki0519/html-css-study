<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两周复习5</title>
</head>
<body>
    <h1>radio checkbox 复习</h1>
    <br>
    <form>
        <label for="man">男</label>
        <input type="radio" id="man" name="gender" checked>
        <br>
        <label for="woman">女</label>
        <input type="radio" id="woman" name="gender">
        <br>
        <label for="hobby">爱好</label>
        <br>
        <label for="篮球">篮球</label>
        <input type="checkbox" id="篮球" name="hobby">
        <br>
        <label for="足球">足球</label>
        <input type="checkbox" id="足球" name="hobby">
        <br>
        <label for="音乐">音乐</label>
        <input type="checkbox" id="音乐" name="hobby" checked>
    </form>
</body>
</html>
