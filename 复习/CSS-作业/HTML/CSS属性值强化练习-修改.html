<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS属性值强化练习</title>
    <style>
        section {
            background-color: antiquewhite;
            border: 1px solid black;
            padding: 50px;
            width: 300px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: rgb(255, 0, 0);
        }

        p {
            font-size: 16px;
            line-height: 24px;
        }

        a {
            color: blueviolet;
            text-decoration: none;
        }

        a:hover {
            color: black;
        }
    </style>
</head>
<body>
    <section>
        <h1>CSS属性值练习</h1>
        <p>一段介绍文字</p>
        <a href="#">查看详情</a>
    </section>
</body>
</html>
