<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的学习卡片</title>
    <style>
        body {
            background-color: rgb(242, 255, 251);
            border: 1px solid black;
            padding: 16px;
            width: 30%;
            height: auto;
            text-align: center;
        }

        h1 {
            color: red;
            font-size: 32px;
            text-align: center;
        }

        a {
            text-decoration: none;
            color: blueviolet;            
        }

        a:hover {
            color: blue;
        }

        img {
            width: 400px;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>我的学习卡片</h1>
    <div>
        <p>
            <strong>一段</strong>
            <em><span>个人</span></em>
            <small><span>介绍</span></small>
            <mark><span>文字</span></mark>
        </p>
        <img src="../../全模型颜色.png" alt="一张图片" title="这是一张介绍图片">
        <br>
        <a href="#">继续学习</a>      
    </div>

</body>
</html>
