<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 Exercise 3</title>
    <style>
        p {
            color: gray;
            font-size: 16px;
        }

        .green {
            color: green;
        }

        .big {
            font-size: 26px;
        }

        .box {
            background-color: lightblue;
            width: 240px;
            height: 100px;
            border: 3px solid blue;
        }
    </style>
</head>
<body>
    <h1>CSS Day 2</h1>
    <p>This is a normal paragraph.</p>
    <p class="green">This paragraph is green.</p>
    <p class="green big">This paragraph is green and big.</p>
    <div class="box">This is a blue box.</div>
</body>
</html>
