<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 19 Exercise 8</title>
    <style>
        h1 {
            text-align: center;
        }

        .big {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border: 2px solid black;
            padding: 20px;
            margin: 20px auto;
            background-color: moccasin;
            height: 150px;
            width: 500px;
        }

        .small {
            display: flex;
            border: 1px solid black;
            background-color: orange;
            border-radius: 20px;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>CSS Day 19</h1>
    <div class="big">
        <div class="small">Card 1</div>
        <div class="small">Card 2</div>
    </div>
</body>
</html>
