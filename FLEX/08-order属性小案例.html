<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>order属性小案例</title>
</head>

<style>
    .container {
        width: 300px;
        height: 200px;

        display: flex;

        flex-flow: column nowrap;

        justify-content: flex-end;
    }

     .item {
        width: 150px;
        /* height: 50px; */
        font-size: 1.5rem;
        background-color: lightcyan;
    }



</style>
<body>
    
    <div class="container">
        <div class="item">
            1 <button onclick="down(this.parentNode)">donw</button><button onclick="up(this.parentNode)">up</button></div>

        <div class="item">
            2 <button onclick="down(this.parentNode)">donw</button><button onclick="up(this.parentNode)">up</button></div>

        <div class="item">
            3 <button onclick="down(this.parentNode)">donw</button><button onclick="up(this.parentNode)">up</button></div>
        
    </div>

        <script>
            function down(ele) {
                ele.style.order = ele.style.order * 1 + 1;
            }

            function up(ele) {
                ele.style.order = ele.style.order * 1 - 1;
            }
        </script>


</body>
</html>
