<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    body{
        background-image: url(../Model_1K_00000.png);
        aspect-ratio: 16 / 9;
        background-size: cover;
    }

    div{
        background: rgba(75, 81, 95, 0.3);
        aspect-ratio: 16 / 9;
        color: azure;
        overflow: hidden;
        border-radius: 22px;
        box-shadow: 0 2px 15px -5px rgba(0,0,0,12);
        text-align: center;
    }

    .a{
        font-size: 30px;
    }

    .b{
        font-family: 微软雅黑;
    }

    .c{
        font-weight: 700;
    }

    .d{
        text-transform: capitalize;
    }

    .e{
        text-decoration: underline;
        /* none：取消已经存在的任何文本装饰。
        underline：文本下划线。
        overline：文本上划线。
        line-through：穿过文本的线。 */
    }
</style>
<body>
    <div>
  <h1>NBB的网站</h1>
  <p>今天我们接着学习字体的相关属性</p>
  <p>首先我们来介绍常见的字体属性</p>
  <ul>
    <li class="a">font-size 代表字体尺寸</li>
    <li class="b">font-faimy 代表字体的类型 如: 楷体, 宋体, 微软雅黑</li>
    <li class="c">font-weight 代表字体的粗细</li>
    <li class="d">text-transform 转化字体的格式 如: 大写 小写</li>
    <li class="e">text-decoration 字体装饰 如: </li>
    <li>text-shadow 字体阴影 (拓展内容)</li>
  </ul>

  <p>接着我们来学习文本布局</p>
  <ul>
    <li>text-align 文本进行移动的操作</li>
    <li>line-height 行与行之间的间距</li>
  </ul>
</div>
</body>
</html>
