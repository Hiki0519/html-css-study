<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 Exercise 4</title>
    <style>
        p {
            color: gray;
            font-size: 18px;
        }

        .red {
            color: red;
        }

        .large {
            font-size: 30px;
        }

        .card {
            background-color: lightyellow;
            width: 260px;
            height: 120px;
            border: 2px solid black;
        }

        .note {
            background-color: lightgreen;
            width: 200px;
            height: 80px;
            border: 2px solid green;
        }
    </style>
</head>
<body>
    <h1>CSS Day 2</h1>
    <p>This is a normal paragraph.</p>
    <p class="red">This paragraph is red.</p>
    <p class="large">This paragraph is large.</p>
    <p class="red large">This paragraph is red and large.</p>
    <div class="card">This is a card.</div>
    <div class="note">This is a note.</div>
</body>
</html>
