<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div和span练习</title>
</head>
<body>
    <h1>个人介绍卡片</h1>
    <div>
        <p>姓名：<span>张三</span></p>
        <p>年龄：<span>18</span></p>
        <p>爱好：<span>打篮球</span></p>
        <br>
        <p>我正在学习<span>html</span>标签。</p>
    </div>
</body>
</html>
