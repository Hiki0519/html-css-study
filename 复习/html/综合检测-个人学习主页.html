<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人学习主页综合检测</title>
</head>

<body>
    <header>
        <div>欢迎来到我的个人学习主页</div>
        <h1>我的学习主页</h1>
        <nav>
            <a href="#">首页</a>
            <a href="#">我的介绍</a>
            <a href="#">学习表单</a>
            <a href="#">联系方式</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>个人介绍区</h2>
            <p>这是<span>我的</span><span>个人介绍</span><span>区域</span></p>
            <strong>个人介绍内容</strong>
            <br>
            <em>我的姓名</em>
            <br>
            <small>HJH</small>
            <br>
            <mark>mark区域</mark>
        </section>
        <hr>
        <section>
            <h2>图片展示区</h2>
            <img src="../../全模型颜色.png" alt="图片展示" title="这是图片展示区">
        </section>
        <hr>
        <section>
            <form>
                <label for="username">用户名：</label>
                <input type="text" placeholder="请输入用户名" id="username" name="username">
                <br>
                <label for="email">邮箱：</label>
                <input type="email" value="sdas@qq.com" id="email" name="email">
                <br>
                <label for="gender">性别：</label>
                <input type="radio" id="男" name="gender" checked>男
                <input type="radio" id="女" name="gender">女
                <br>
                <label for="hobby">爱好：</label>
                <input type="checkbox" id="篮球" name="hobby" checked>篮球
                <input type="checkbox" id="排球" name="hobby">排球
                <input type="checkbox" id="足球" name="hobby">足球
                <br>
                <label for="city">城市：</label>
                <select id="city" name="city">
                    <option>北京</option>
                    <option>上海</option>
                    <option>广州</option>
                </select>
                <br>
                <label for="message">留言内容：</label>
                <br>
                <textarea name="message" id="message" placeholder="请在这里输入留言内容"></textarea>
                <br>
                <label for="remark">备注：</label>
                <br>
                <textarea name="remark" id="remark">默认内容</textarea>
                <br>
                <input type="submit">
                <input type="reset">
                <br>
                <hr>
            </form>
        </section>
    </main>

    <footer>这是我的HTML综合练习页面</footer>
</body>
</html>
