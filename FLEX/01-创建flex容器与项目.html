<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建flex容器与项目</title>
</head>

<style>
    /* 容器宽度 */
    .container {
        width: 300px;
        height: 150px;

        display: flex;
    }

    .item {
        width: 100px;
        height: 50px;
        background-color: lightcyan;
    }
</style>
<body>
    <!-- .container>.item{$}*4  -->
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>
    
</body>
</html>
