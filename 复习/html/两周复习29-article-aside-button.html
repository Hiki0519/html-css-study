<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两周复习29</title>
</head>
<body>
    <h1>article aside button 复习</h1>
    <br>
    <main>
        <article>
            <h2>学习文章</h2>
            <p>article 表示一块相对独立的内容。</p>
        </article>

        <aside>
            <h3>补充内容</h3>
            <p>aside 表示侧边栏或补充说明。</p>
        </aside>
    </main>
    <button type="button">普通按钮</button>
    <button type="submit">提交按钮</button>
    <button type="reset">重置按钮</button>
</body>
</html>
