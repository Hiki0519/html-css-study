<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 10 Exercise 2</title>
    <style>
        div {
            width: 320px;
            height: 220px;
            border-radius: 20px;
            box-shadow: 6px 6px 12px lightgray;
            padding-top: 20px;
            padding-left: 20px;
            margin-top: 20px;
        }

        .Blue {
            background-color: lightblue;
            border: 2px solid blue;
        }

        .Green {
            background-color: lightgreen;
            border: 2px solid green;
        }

        h2 {
            font-size: 24px;
        }

        p {
            font-size: 16px;
            line-height: 28px;
        }

        .first {
            color: blue;
        }

        .second {
            color: green;
        }
    </style>
</head>
<body>
    <h1>CSS Day 10</h1>
    <div class="Blue">
        <h2 class="first">Blue Card</h2>
        <p>This is the first card paragraph.</p>
    </div>

    <div class="Green">
        <h2 class="second">Green Card</h2>
        <p>This is the second card paragraph.</p>
    </div>
</body>
</html>
