<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阶段复习3</title>
</head>
<body>
    <h1>label id name 练习</h1>
    <form>
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名">
        <br><br>

        <label for="email">邮箱：</label>
        <input type="email" id="email" name="email" value="dada@qq.com">
        <br><br>

        <label for="city">城市：</label>
        <input type="text" id="city" name="city" placeholder="请输入城市">
        <br><br>

        性别：
        <input type="radio" id="male" name="gender" checked>
        <label for="male">男</label>
        <input type="radio" id="female" name="gender">
        <label for="female">女</label>
        <br><br>

        爱好：
        <input type="checkbox" id="basketball" name="hobby" checked>
        <label for="basketball">篮球</label>
        <input type="checkbox" id="volleyball" name="hobby" checked>
        <label for="volleyball">排球</label>
        <input type="checkbox" id="football" name="hobby" checked>
        <label for="football">足球</label>
    </form>
</body>
</html>
