<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两周复习20</title>
</head>
<body>
    <h1>form 综合复习</h1>

    <form>
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username" placeholder="这是用户名">
        <br>
        <label for="email">邮箱：</label>
        <input type="email" id="email" name="email" value="test@qq.com">
        <br>
        性别：
        <input type="radio" id="male" name="gender" checked>
        <label for="male">男</label>
        <input type="radio" id="female" name="gender">
        <label for="female">女</label>
        <br>
        <label for="city">城市：</label>
        <select id="city" name="city">
            <option>北京</option>
            <option selected="selected">上海</option>
            <option>广州</option>
        </select>
        <br>
        <label for="remark">留言：</label>
        <textarea name="remark" id="remark" placeholder="这是留言板"></textarea>
        <br>
        <input type="submit">
        <input type="reset">
    </form>
</body>
</html>
