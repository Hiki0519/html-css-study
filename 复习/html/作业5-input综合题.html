<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户信息登记页</title>
</head>
<body>
    <h1>用户信息登记</h1>
    <br>
    “用户名”:
    <input type="text" placeholder="让用户输入用户名" id="用户名" name="用户名">
    <br>
    “密码”:
    <input type="password" id="密码" placeholder="密码" name="密码">
    <br>
    “邮箱”:
    <input type="email" value="dajds@qq.com" id="邮箱" name="密码">
    <br>
    “年龄”:
    <input type="number" id="年龄" placeholder="年龄" name="年龄">
    <br>
    “性别”:
    <input type="radio" name="gender" id="男" checked>男
    <input type="radio" name="gender" id="女">女
    <br>
    “爱好”:
    <input type="checkbox" name="hobby" id="篮球">篮球
    <input type="checkbox" name="hobby" id="排球">排球
    <input type="checkbox" name="hobby" id="网球" checked>网球
    <br>
    “出生日期”:
    <input type="date" id="出生日期" name="出生日期">
    <br>
    "喜欢的颜色":
    <input type="color" id="喜欢的颜色" name="喜欢的颜色">
    


</body>
</html>
