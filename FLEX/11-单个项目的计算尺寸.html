<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单个项目的计算尺寸</title>
</head>

<style>
    .container {
        width: 300px;
        height: 200px;
        display: flex;
        flex-wrap: wrap;

    }

     .item {
        /* min-width: 90px; */
        /* min-width最小宽度值会覆盖flex-basis的数值 */

        /* flex-basis: auto; */
        /* flex-basis: 80px; */
        /* flex-basis: 20%; */
        width: 50px;
        height: 50px;
        font-size: 1.5rem;
        background-color: lightcyan;

        flex-basis: 100px;
        flex-basis: 150px;
        /* 不需要改变项目大小 */
    }

   


</style>
<body>
    
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>


</body>
</html>
