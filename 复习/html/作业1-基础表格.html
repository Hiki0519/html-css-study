<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础表格练习</title>
</head>

<body>
    <table border="1" cellspacing="0" width="400">
        
        <thead>
            <tr>
                <th>姓名</th>
                <th>年龄</th>
                <th>城市</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>张三</td>
                <td>18</td>
                <td>北京</td>
            </tr>
        </tbody>

        <tbody>
            <tr>
                <td>李四</td>
                <td>19</td>
                <td>上海</td>
            </tr>
        </tbody>

        <tbody>
            <tr>
                <td>王五</td>
                <td>20</td>
                <td>广州</td>
            </tr>
        </tbody>

    </table>
</body>
</html>
