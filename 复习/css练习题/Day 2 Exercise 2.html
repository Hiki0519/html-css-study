<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 Exercise 2</title>
    <style>
        p {
            color: gray;
            font-size: 18px;
        }

        .blue {
            color: blue;
        }

        .large {
            font-size: 28px;
        }

        .card {
            background-color: lightyellow;
            width: 220px;
            height: 120px;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <h1>CSS Day 2</h1>
    <p class="blue">This is the first paragraph.</p>
    <p class="blue large">This is the second paragraph.</p>
    <div class="card">This is a card.</div>
</body>
</html>
