<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>select综合练习</title>
</head>
<body>
    <h1>信息选择表</h1>
    <br>
    <form>
        <label for="city">城市：</label>
        <select id="city" name="city">
            <option>北京</option>
            <option selected="selected">上海</option>
            <option>广州</option>
            <option>深圳</option>
        </select>
        <br>
        <label for="Educational qualifications">学历：</label>
        <select id="Educational qualifications" name="Educational qualifications">
            <option>高中</option>
            <option>大专</option>
            <option selected="selected">本科</option>
            <option>研究生</option>
        </select>
        <br>
        <label for="color">颜色：</label>
        <select id="color" name="color">
            <option>红色</option>
            <option>蓝色</option>
            <option>绿色</option>
            <option>黄色</option>
        </select>
        <br>
        <br>
        <input type="submit">
        <input type="reset">
    </form>
</body>
</html>
