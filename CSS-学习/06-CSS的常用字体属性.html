<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>


<style>

    @font-face{
        font-family: "Poppins-Medium";
        src: url("../Poppins-Medium.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
    }
    h1{
        color: red;

        font-size: 3em;
        /* font-size: 字体大小; */

        font-weight: 700;
        /* font-weight: 字体粗细; */

        font-family: "Poppins-Medium-Medium";
        /* font-family: 字体格式; */
    }

    .blue{
        color: blue;
    }

    .green{
        color: green;
    }

    p{
        /* color: blue; */

        font-size: 32px;

        font-weight: 400;

        font-family: "Poppins-Medium";
    }
</style>

<body>
    
    <h1>这是标签</h1>
    <p class="blue">This is my first CSS example</p>
    <p class="green">This is test</p>

</body>
</html>
