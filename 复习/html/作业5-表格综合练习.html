<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格综合练习</title>

    <style>
        table {
            border-collapse: collapse;
        }

        th,td {
            text-align: center;
            padding: 8px;
        }
    </style>
</head>
<body>
    <table width="500" border="1" cellspacing="0">
        <caption>图书信息表</caption>

        <thead>
            <tr>
                <th>书名</th>
                <th>作者</th>
                <th>价格</th>
                <th>出版社</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>HTML入门</td>
                <td>张老师</td>
                <td>35元</td>
                <td>人民邮电</td>
            </tr>

            <tr>
                <td>CSS基础</td>
                <td>李老师</td>
                <td>42元</td>
                <td>清华大学</td>
            </tr>

            <tr>
                <td>JavaScript初级</td>
                <td>王老师</td>
                <td>58元</td>
                <td>机械工业</td>
            </tr>

            <tr>
                <td>前端练习手册</td>
                <td>赵老师</td>
                <td>46元</td>
                <td>电子工业</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="4">以上是本周推荐图书</td>
            </tr>
        </tfoot>

    </table>
</body>
</html>
