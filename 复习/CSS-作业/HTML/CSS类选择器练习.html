<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>类选择器练习</title>
    <style>
        .red {
            color: red;
            font-size: 20px;
            border: 1px solid black;
        }

        a {
            color: blueviolet;
            text-decoration: none;
            /* text-decoration: none;-给文本取消下划线 */
        }
    </style>
</head>
<body>
    <span class="red">这是第一段文字</span>
    <br>
    <div class="brown">这是第一段文字</div>
    <p>这是第三段文字</p>
    <a href="#">点击进入学习页面</a>
</body>
</html>
