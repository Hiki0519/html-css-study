<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 12 Exercise 2</title>
    <style>
        .first {
            color: blue;
            background-color: lightblue;
            text-decoration: none;
            border: 2px solid blue;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 18px;
            padding-right: 18px;
            border-radius: 12px;
        }

        .second {
            color: green;
            background-color: lightgreen;
            text-decoration: none;
            border: 2px solid green;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 18px;
            padding-right: 18px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <h1>CSS Day 12</h1>
    <a href="https://example.com" class="first">Blue Button</a>
    <a href="https://example.com" class="second">Green Button</a>
</body>
</html>
