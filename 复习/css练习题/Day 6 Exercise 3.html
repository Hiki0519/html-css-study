<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 6 Exercise 3</title>
    <style>
        .first {
            width: 300px;
            height: 200px;
            background-color: lightgray;
            background-image: url(../../Model.png);
            background-repeat: no-repeat;
            background-size: 120px 120px;
            background-position: center;
            border: 2px solid black;
        }

        .second {
            width: 300px;
            height: 80px;
            background-color: lightblue;
            border: 2px solid blue;
        }

        img {
            width: 120px;
            height: 120px;
            border: 2px solid red;
        }
    </style>
</head>
<body>
    <h1>CSS Day 6</h1>
    <div class="first"></div>    
    <div class="second">This is a background box.</div>
    <img src="../../Model.png" alt="Model" title="this is Model">    
</body>
</html>
