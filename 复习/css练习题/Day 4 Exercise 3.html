<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 Exercise 3</title>
    <style>
        .First {
            display: block;
            width: 180px;
            height: 70px;
            background-color: lightblue;
            border: 2px solid blue;
            margin: 10px;
        }

        .Second {
            display: inline-block;
            width: 180px;
            height: 70px;
            background-color: lightpink;
            border: 2px solid red;
            margin: 10px;
        }

        span {
            display: inline;
            background-color: lightgreen;
        }
    </style>
</head>
<body>
    <h1>CSS Day 4</h1>
    <div class="First">Block Box</div>
    <div class="Second">Inline Block Box</div>
    <span>Inline Text 1</span>
    <span>Inline Text 2</span>
</body>
</html>
