<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input属性综合练习</title>
</head>
<body>
    <h1>用户资料卡</h1>
    <br>
    用户名输入框:
    <input type="text" placeholder="请输入用户名" name="username" id="username">
    <br>
    邮箱输入框:
    <input type="email" value="test@qq.com" name="email" id="email">
    <br>
    性别单选框:
    <input type="radio" name="gender" id="男">男
    <input type="radio" name="gender" checked id="女">女
    <br>
    爱好多选框：
    <input type="checkbox" name="hobby" id="看书">看书
    <input type="checkbox" name="hobby" id="运动">运动
    <input type="checkbox" name="hobby" id="音乐" checked>音乐
    <br>


</body>
</html>
