<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textarea练习</title>
</head>
<body>
    <h1>留言板</h1>
    
    <label for="message">留言内容</label>
    <br>
    <textarea name="message" id="message" rows="5" cols="25" placeholder="请输入留言内容"></textarea>
    <br>
    <label for="remark">备注</label>
    <br>
    <textarea name="remark" id="remark">这是备注</textarea>

</body>
</html>
