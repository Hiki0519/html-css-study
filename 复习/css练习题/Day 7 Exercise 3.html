<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 7 Exercise 3</title>
    <style>
        div {
            width: 260px;
            height: 140px;
        }

        .first {
            background-color: lightblue;
            border: 2px solid blue;
            border-radius: 20px;
            box-shadow: 6px 6px 12px lightgray;
        }

        .second {
            background-color: lightgreen;
            border: 2px solid green;
            border-radius: 30px;
            box-shadow: 10px 10px 16px gray;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>CSS Day 7</h1>
    <div class="first">This is card one.</div>
    <div class="second">This is card two.</div>
</body>
</html>
