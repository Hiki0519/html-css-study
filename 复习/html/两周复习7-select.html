<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两周复习7</title>
</head>
<body>
    <h1>select 复习</h1>
    <br>
    <form>
        <label for="city">城市选择</label>
        <select name="city" id="city">
            <option>北京</option>
            <option selected="selected">上海</option>
            <option>广州</option>
            <option>深圳</option>
        </select>
    </form>
</body>
</html>
