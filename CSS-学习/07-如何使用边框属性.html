<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p{
            border: 1px solid red; 
            /* 1.边框像素。 2.边框样式。3.边框颜色。*/
        }

        div{
            border: 1px solid green;
        }

        /* 常见的线型还有： */

/* dashed:虚线 border: 1px dashed red;

dotted:点线 border: 1px dotted red;

double:双线 border: 3px double red;

none:没有边框 */

    </style>
</head>
<body>
    <p>这是一个P标签</p>
    <br>
    <div>这是一个div标签</div>
</body>
</html>
