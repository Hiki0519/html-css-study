<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Img And Background</title>
    <style>
        .first {
            width: 300px;
            height: 200px;
            background-color: lightblue;
            background-image: url("../../Model.png");
            background-repeat: no-repeat;
            background-size: 120px 120px;
            background-position: center;
            border: 2px solid blue;
            border-radius: 20px;
            margin-top: 20px;
        }

        .second {
            width: 260px;
            background-color: lightyellow;
            border: 2px solid orange;
            border-radius: 20px;
            padding-top: 20px;
            padding-left: 20px;
            margin-top: 20px;
        }

        img {
            display: block;
            width: 200px;
            height: 150px;
            border: 2px solid orange;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>IMG And Background Review</h1>
    <div class="first"></div>
    <div class="second">
        <img src="../../Model.png" alt="Model image">
    </div>
</body>
</html>
