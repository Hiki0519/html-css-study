<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本标签练习</title>
</head>
<body>
    <h1>常见文本标签练习</h1>
    <br>
    <p>今天的学习内容</p>
    <br>
    <strong>今天的学习内容</strong>
    <br>
    <b>今天的学习内容</b>
    <br>
    <em>今天的学习内容</em>
    <br>
    <i>今天的学习内容</i>
    <br>
    <u>今天的学习内容</u>
    <br>
    <small>今天的学习内容</small>
    <br>
    <mark>今天的学习内容</mark>
    <br>
    <hr>

<!-- hr： 横线分隔
strong：重要内容，通常加粗
b：单纯加粗
em：强调内容，通常斜体
i：单纯斜体
u：下划线
small：小号文字
mark：高亮标记 -->

</body>
</html>
