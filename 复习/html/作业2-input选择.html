<!DOCTYPE html>

<head>

    <title>input选择练习</title>
</head>
<body>
    <h1>个人信息选择</h1>
    性别：
    男<input type="radio" name="gender">
    女<input type="radio" name="gender">

    喜欢的颜色：<input type="color">
