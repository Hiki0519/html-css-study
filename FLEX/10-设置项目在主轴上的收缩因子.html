<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单个项目的收缩因子</title>
</head>

<style>
    .container {
        width: 300px;
        height: 200px;
        display: flex;
        flex-wrap: nowrap;
    }

     .item {
        width: 150px;
        height: 50px;
        font-size: 1.5rem;
        background-color: lightcyan;
    }

    .item:first-of-type {
        flex-shrink: 0;
        /* 默认值就是1 */
        /* 0是不允许收缩 */
    }

    .item:nth-of-type(2) {
        flex-shrink: 1;
    }

    .item:last-of-type {
        flex-shrink: 2;
    }

     /* 缩小比例计算公式：
    1.计算出需要收缩的主轴空间: 300 - 150 = 150px
    2.计算收缩因子(0 + 1 + 2)=3 0是不收缩
    3.将需要收缩空间150px分成三等分: 150 / 3 = 50px

    5.第二个项目： 150px - (1*50)= 100px
    6.第三个项目： 150px - (2*50)= 50px */   


</style>
<body>
    
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>


</body>
</html>
