<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>order属性调整顺序</title>
</head>

<style>
    .container {
        width: 300px;
        height: 200px;

        display: flex;

        /* flex-flow: row wrap; */
    }

     .item {
        width: 100px;
        height: 50px;
        font-size: 1.5rem;
        background-color: lightcyan;
    }

   /* order 数值越大越靠后 数值越小越靠前 */
    .item:first-of-type{
        order: 5;
        background-color: chartreuse;
    }

    .item:nth-of-type(2){
        order: 1;
        background-color: blanchedalmond;
    }

    .item:last-of-type{
        order: 2;
        background-color: brown;
    }

</style>
<body>
    
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>
</body>
</html>
