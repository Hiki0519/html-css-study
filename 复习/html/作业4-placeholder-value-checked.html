<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>placeholder value checked</title>
</head>
<body>
    <h1>默认信息展示</h1>

    <input type="text" placeholder="请输入姓名">
    <br>
    <input type="email" value="123@qq.com">
    <br>
    男<input type="radio" name="gender" checked="男">
    <br>
    女<input type="radio" name="gender">

    看书<input type="checkbox" name="hobby" checked="看书">
    <br>
    运动<input type="checkbox" name="hobby">
    <br>
    音乐<input type="checkbox" name="hobby">


</body>
</html>
