<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS综合卡片练习</title>
    <style>
        section {
            background-color: antiquewhite;
            border: 5px solid black;
            padding: 20px;
            width: 250px;
        }

        h1 {
            font-size: 20px;
            font-weight: 20px;
            color: brown;
        }

        p {
            font-size: 15px;
            line-height: 20px;
        }

        a {
            color: aquamarine;
            text-decoration: none;
        }

        a:hover {
            color: violet;
        }
    </style>
</head>
<body>
    <section>
        <h1>CSS学习卡片</h1>
        <p>这是学习卡片</p>
        <a href="https://baidu.com">继续学习</a>
    </section>
</body>
</html>
